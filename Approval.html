<!-- ── APPROVAL PAGE ────────────────────────────────────────── -->
<div class="page-header">
  <div>
    <div class="page-header-title">Approval</div>
    <div class="page-header-sub">Review and act on submitted trip requests</div>
  </div>
  <button class="btn btn-ghost btn-sm" onclick="ApprovalService.load()">
    <i class="fas fa-rotate-right"></i> Refresh
  </button>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <input type="text" class="form-control" id="apprSearch"
    placeholder="Search ID, requestor, purpose..."
    oninput="ApprovalService.applyFilter()"/>
  <select class="form-control" id="apprFilterStatus" onchange="ApprovalService.applyFilter()">
    <option value="Submitted">Pending Approval</option>
    <option value="">All Statuses</option>
    <option value="Approved">Approved</option>
    <option value="Rejected">Rejected</option>
    <option value="Cancelled">Cancelled</option>
  </select>
  <select class="form-control" id="apprFilterType" onchange="ApprovalService.applyFilter()">
    <option value="">All Trip Types</option>
  </select>
</div>

<!-- APPROVAL TABLE -->
<div class="card" style="padding:0;overflow:hidden;">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Trip ID</th>
          <th>Request Date</th>
          <th>Requestor</th>
          <th>Trip Type</th>
          <th>Purpose</th>
          <th>From → To</th>
          <th>Planned Start</th>
          <th>Vehicle</th>
          <th>Driver</th>
          <th>Status</th>
          <th style="text-align:right;">Actions</th>
        </tr>
      </thead>
      <tbody id="apprTableBody">
        <tr><td colspan="11" class="table-empty">
          <i class="fas fa-spinner fa-spin"></i> Loading...
        </td></tr>
      </tbody>
    </table>
  </div>
</div>
