<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OPS Trip Monitoring System</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <?!= include('Stylesheet'); ?>
</head>
<body>

  <!-- ── SPLASH / USER SELECT SCREEN ─────────────────────── -->
  <div id="splashScreen" class="splash-screen">
    <div class="splash-card">
      <div class="splash-logo">
        <div class="logo-icon"><i class="fas fa-truck-fast"></i></div>
        <div class="logo-text">
          <span class="logo-title">OPS</span>
          <span class="logo-sub">Trip Monitoring System</span>
        </div>
      </div>
      <p class="splash-desc">Select your account to continue</p>
      <div class="form-group">
        <label class="form-label">Who are you?</label>
        <select id="userSelect" class="form-control" disabled>
          <option value="">Loading employees...</option>
        </select>
      </div>

      <!-- Shown while loading employees -->
      <div id="splashLoadingMsg" style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);margin-bottom:12px;">
        <i class="fas fa-spinner fa-spin"></i> Connecting to server...
      </div>

      <!-- Enter button — disabled until employees load -->
      <button id="loginBtn" class="btn btn-primary btn-full" onclick="AppService.loginUser()" disabled>
        <i class="fas fa-arrow-right-to-bracket"></i> Enter System
      </button>

      <!-- Retry button — only shown on connection error -->
      <button id="splashRetryBtn" class="btn btn-ghost btn-full hidden" onclick="AppService.retryLoadEmployees()" style="margin-top:8px;">
        <i class="fas fa-rotate-right"></i> Retry Connection
      </button>

      <div id="splashError" class="splash-error hidden">Please select your name to continue.</div>
    </div>
  </div>

  <!-- ── MAIN APP ──────────────────────────────────────────── -->
  <div id="mainApp" class="app-wrapper hidden">

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon-sm"><i class="fas fa-truck-fast"></i></div>
          <span>OPS TMS</span>
        </div>
        <button class="sidebar-toggle" onclick="AppService.toggleSidebar()">
          <i class="fas fa-bars"></i>
        </button>
      </div>

      <div class="sidebar-user">
        <div class="user-avatar" id="sidebarAvatar">?</div>
        <div class="user-info">
          <div class="user-name" id="sidebarUserName">—</div>
          <div class="user-role" id="sidebarUserRole">—</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>

        <a class="nav-item" data-page="dashboard" onclick="AppService.navigate('dashboard')">
          <i class="fas fa-gauge-high"></i>
          <span>Dashboard</span>
        </a>

        <a class="nav-item" data-page="trips" onclick="AppService.navigate('trips')">
          <i class="fas fa-route"></i>
          <span>Trip Requests</span>
        </a>

        <a class="nav-item nav-item-role" data-roles="Approver,Admin" data-page="approval" onclick="AppService.navigate('approval')">
          <i class="fas fa-clipboard-check"></i>
          <span>Approval</span>
          <span class="nav-badge hidden" id="approvalBadge">0</span>
        </a>

        <a class="nav-item nav-item-role" data-roles="Admin,Approver" data-page="completion" onclick="AppService.navigate('completion')">
          <i class="fas fa-flag-checkered"></i>
          <span>Trip Completion</span>
        </a>

        <div class="nav-section-label">Fleet</div>

        <a class="nav-item nav-item-role" data-roles="Admin,Approver" data-page="vehicles" onclick="AppService.navigate('vehicles')">
          <i class="fas fa-car"></i>
          <span>Vehicles</span>
        </a>

        <a class="nav-item nav-item-role" data-roles="Admin,Approver,Auditor" data-page="renewalAlerts" onclick="AppService.navigate('renewalAlerts')">
          <i class="fas fa-bell"></i>
          <span>Renewal Alerts</span>
          <span class="nav-badge nav-badge-warn hidden" id="renewalBadge">0</span>
        </a>

        <div class="nav-section-label">Analytics</div>

        <a class="nav-item nav-item-role" data-roles="Admin,Approver,Auditor" data-page="reports" onclick="AppService.navigate('reports')">
          <i class="fas fa-chart-bar"></i>
          <span>Reports</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="btn-logout" onclick="AppService.logout()">
          <i class="fas fa-right-from-bracket"></i>
          <span>Switch User</span>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">

      <!-- TOP BAR -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="topbar-toggle" onclick="AppService.toggleSidebar()">
            <i class="fas fa-bars"></i>
          </button>
          <div class="breadcrumb">
            <span id="pageTitle">Dashboard</span>
          </div>
        </div>
        <div class="topbar-right">
          <div class="topbar-date" id="topbarDate"></div>
          <div class="topbar-user">
            <div class="user-avatar-sm" id="topbarAvatar">?</div>
            <span id="topbarUserName">—</span>
          </div>
        </div>
      </header>

      <!-- PAGE CONTENT AREA -->
      <main class="page-area" id="pageArea">

        <!-- DASHBOARD PAGE -->
        <div class="page hidden" id="page-dashboard">
          <?!= include('Dashboard'); ?>
        </div>

        <!-- TRIPS PAGE -->
        <div class="page hidden" id="page-trips">
          <?!= include('Trips'); ?>
        </div>

        <!-- APPROVAL PAGE -->
        <div class="page hidden" id="page-approval">
          <?!= include('Approval'); ?>
        </div>

        <!-- COMPLETION PAGE -->
        <div class="page hidden" id="page-completion">
          <?!= include('Completion'); ?>
        </div>

        <!-- VEHICLES PAGE -->
        <div class="page hidden" id="page-vehicles">
          <?!= include('Vehicles'); ?>
        </div>

        <!-- RENEWAL ALERTS PAGE -->
        <div class="page hidden" id="page-renewalAlerts">
          <?!= include('RenewalAlerts'); ?>
        </div>

        <!-- REPORTS PAGE -->
        <div class="page hidden" id="page-reports">
          <?!= include('Reports'); ?>
        </div>

      </main>
    </div>
  </div>

  <!-- ── GLOBAL MODAL ──────────────────────────────────────── -->
  <div id="globalModal" class="modal-overlay hidden">
    <div class="modal-box" id="modalBox">
      <div class="modal-header">
        <h3 class="modal-title" id="modalTitle">Modal</h3>
        <button class="modal-close" onclick="AppService.closeModal()">
          <i class="fas fa-xmark"></i>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- ── TOAST NOTIFICATION ────────────────────────────────── -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ── GLOBAL LOADER ─────────────────────────────────────── -->
  <div id="globalLoader" class="global-loader hidden">
    <div class="loader-spinner"></div>
    <div class="loader-text" id="loaderText">Loading...</div>
  </div>

  <!-- ── SCRIPTS ───────────────────────────────────────────── -->
  <?!= include('AppService'); ?>
  <?!= include('VehiclesService'); ?>
  <?!= include('TripsService'); ?>
  <?!= include('ApprovalService'); ?>
  <?!= include('CompletionService'); ?>
  <?!= include('ReportsService'); ?>
  <?!= include('RenewalAlertsService'); ?>
  <?!= include('DashboardService'); ?>

</body>
</html>
