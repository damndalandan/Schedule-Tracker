<script>
// ============================================================
// TripsService.html — Trip Requests Page Logic
// Save this file as: TripsService.html in Apps Script
// ============================================================

var TripsService = (function() {

  var _allTrips  = [];
  var _editingId = null;

  // ── LOAD ───────────────────────────────────────────────────
  function load() {
    _populateTripTypeFilter();
    _fetchTrips();
  }

  function _populateTripTypeFilter() {
    var appData = AppService.getAppData();
    if (!appData) return;
    var types = appData.settings['Trip Type'] || [];
    var sel   = document.getElementById('tripFilterType');
    if (!sel || sel.options.length > 1) return;
    for (var i = 0; i < types.length; i++) {
      var opt = document.createElement('option');
      opt.value       = types[i];
      opt.textContent = types[i];
      sel.appendChild(opt);
    }
  }

  function _fetchTrips() {
    var tbody = document.getElementById('tripsTableBody');
    if (tbody) {
      tbody.innerHTML = '<tr><td colspan="10" class="table-empty"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
    }

    google.script.run
      .withSuccessHandler(function(trips) {
        _allTrips = trips;

        // Requestors only see their own trips
        var user = AppService.getCurrentUser();
        if (AppService.hasRole('Requestor')) {
          _allTrips = trips.filter(function(t) {
            return String(t['Requestor Employee ID']) === String(user['Employee ID']);
          });
        }

        applyFilter();
      })
      .withFailureHandler(function() {
        if (tbody) {
          tbody.innerHTML = '<tr><td colspan="10" class="table-empty">Failed to load trips.</td></tr>';
        }
        AppService.showToast('Failed to load trips.', 'error');
      })
      .getTrips();
  }

  // ── FILTER ─────────────────────────────────────────────────
  function applyFilter() {
    var search = (document.getElementById('tripSearch')       ? document.getElementById('tripSearch').value       : '').toLowerCase();
    var status = (document.getElementById('tripFilterStatus') ? document.getElementById('tripFilterStatus').value : '');
    var type   = (document.getElementById('tripFilterType')   ? document.getElementById('tripFilterType').value   : '');

    var filtered = _allTrips.filter(function(t) {
      var matchSearch = !search ||
        (t['Trip ID']         || '').toLowerCase().indexOf(search) > -1 ||
        (t['Requestor Name']  || '').toLowerCase().indexOf(search) > -1 ||
        (t['Purpose']         || '').toLowerCase().indexOf(search) > -1 ||
        (t['Plate Number']    || '').toLowerCase().indexOf(search) > -1 ||
        (t['Driver Name']     || '').toLowerCase().indexOf(search) > -1;
      var matchStatus = !status || t['Status'] === status;
      var matchType   = !type   || t['Trip Type'] === type;
      return matchSearch && matchStatus && matchType;
    });

    // Sort newest first
    filtered.sort(function(a, b) {
      return new Date(b['Request Date']) - new Date(a['Request Date']);
    });

    _renderTable(filtered);
  }

  // ── RENDER TABLE ───────────────────────────────────────────
  function _renderTable(trips) {
    var tbody = document.getElementById('tripsTableBody');
    if (!tbody) return;

    if (trips.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="table-empty">No trips found.</td></tr>';
      return;
    }

    var rows = '';
    for (var i = 0; i < trips.length; i++) {
      var t      = trips[i];
      var tId    = AppService.escapeHtml(t['Trip ID']);
      var status = t['Status'];
      var user   = AppService.getCurrentUser();
      var isOwn  = String(t['Requestor Employee ID']) === String(user['Employee ID']);

      // Action buttons based on status and role
      var actionBtns =
        '<button class="btn btn-ghost btn-sm btn-icon" title="View" ' +
          'onclick="TripsService.viewTrip(\'' + tId + '\')">' +
          '<i class="fas fa-eye"></i></button>';

      // Edit draft — only owner or Admin
      if (status === 'Draft' && (isOwn || AppService.hasRole('Admin'))) {
        actionBtns +=
          '<button class="btn btn-ghost btn-sm btn-icon" title="Edit" ' +
            'onclick="TripsService.openForm(\'' + tId + '\')">' +
            '<i class="fas fa-pen"></i></button>';
      }

      // Submit — only owner or Admin, only Draft
      if (status === 'Draft' && (isOwn || AppService.hasRole('Admin'))) {
        actionBtns +=
          '<button class="btn btn-ghost btn-sm btn-icon" title="Submit" style="color:var(--info);" ' +
            'onclick="TripsService.submitTrip(\'' + tId + '\')">' +
            '<i class="fas fa-paper-plane"></i></button>';
      }

      // Cancel — owner or Admin, if not Completed/Rejected/Cancelled
      if ((isOwn || AppService.hasRole('Admin')) &&
          status !== 'Completed' && status !== 'Rejected' && status !== 'Cancelled') {
        actionBtns +=
          '<button class="btn btn-ghost btn-sm btn-icon" title="Cancel" style="color:var(--warning);" ' +
            'onclick="TripsService.cancelTrip(\'' + tId + '\')">' +
            '<i class="fas fa-ban"></i></button>';
      }

      rows +=
        '<tr>' +
          '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--accent);">' + tId + '</span></td>' +
          '<td style="font-size:12px;color:var(--text-muted);">' + AppService.formatDate(t['Request Date']) + '</td>' +
          '<td>' + AppService.escapeHtml(t['Requestor Name'] || '—') + '</td>' +
          '<td style="font-size:12px;">' + AppService.escapeHtml(t['Trip Type'] || '—') + '</td>' +
          '<td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
            AppService.escapeHtml(t['Purpose'] || '—') +
          '</td>' +
          '<td style="font-size:12px;">' + AppService.escapeHtml(t['Plate Number'] || '—') + '</td>' +
          '<td>' + AppService.escapeHtml(t['Driver Name'] || '—') + '</td>' +
          '<td style="font-size:12px;color:var(--text-muted);">' + AppService.formatDate(t['Planned Start DateTime']) + '</td>' +
          '<td>' + AppService.statusBadge(status) + '</td>' +
          '<td style="text-align:right;">' +
            '<div class="action-row" style="justify-content:flex-end;">' + actionBtns + '</div>' +
          '</td>' +
        '</tr>';
    }

    tbody.innerHTML = rows;
  }

  // ── VIEW TRIP ──────────────────────────────────────────────
  function viewTrip(tripId) {
    var t = _findTrip(tripId);
    if (!t) return;

    var body =
      '<div class="section-title">Request Details</div>' +
      '<div class="detail-grid">' +
        _dItem('Trip ID',      '<span style="font-family:var(--font-mono);color:var(--accent);">' + AppService.escapeHtml(t['Trip ID']) + '</span>') +
        _dItem('Status',       AppService.statusBadge(t['Status'])) +
        _dItem('Request Date', AppService.formatDateTime(t['Request Date'])) +
        _dItem('Trip Type',    AppService.escapeHtml(t['Trip Type'] || '—')) +
        _dItem('Requestor',    AppService.escapeHtml(t['Requestor Name'] || '—')) +
        _dItem('Related JO',   AppService.escapeHtml(t['Related JO'] || '—')) +
        '<div class="detail-item" style="grid-column:1/-1;">' +
          '<div class="detail-label">Purpose</div>' +
          '<div class="detail-value">' + AppService.escapeHtml(t['Purpose'] || '—') + '</div>' +
        '</div>' +
        _dItem('From',         AppService.escapeHtml(t['From Location'] || '—')) +
        _dItem('To',           AppService.escapeHtml(t['To Location']   || '—')) +
        _dItem('Planned Start', AppService.formatDateTime(t['Planned Start DateTime'])) +
        _dItem('Planned End',   AppService.formatDateTime(t['Planned End DateTime'])) +
      '</div>' +

      '<div class="section-title" style="margin-top:18px;">Vehicle & Driver</div>' +
      '<div class="detail-grid">' +
        _dItem('Vehicle ID',    AppService.escapeHtml(t['Vehicle ID']   || '—')) +
        _dItem('Plate Number',  AppService.escapeHtml(t['Plate Number'] || '—')) +
        _dItem('Driver',        AppService.escapeHtml(t['Driver Name']  || '—')) +
      '</div>' +

      '<div class="section-title" style="margin-top:18px;">Approval</div>' +
      '<div class="detail-grid">' +
        _dItem('Approved By',       AppService.escapeHtml(t['Approved By']             || '—')) +
        _dItem('Approval Date',     AppService.formatDateTime(t['Approval/Rejection Date'])) +
        _dItem('Rejection Reason',  AppService.escapeHtml(t['Rejection Reason']         || '—')) +
        _dItem('Cancel Reason',     AppService.escapeHtml(t['Cancel Reason']            || '—')) +
      '</div>';

    // Actual trip details if completed
    if (t['Status'] === 'Completed') {
      body +=
        '<div class="section-title" style="margin-top:18px;">Actual Trip Details</div>' +
        '<div class="detail-grid">' +
          _dItem('Actual Start',       AppService.formatDateTime(t['Actual Start DateTime'])) +
          _dItem('Actual End',         AppService.formatDateTime(t['Actual End DateTime'])) +
          _dItem('Start Mileage',      t['Start Mileage'] ? Number(t['Start Mileage']).toLocaleString() + ' km' : '—') +
          _dItem('End Mileage',        t['End Mileage']   ? Number(t['End Mileage']).toLocaleString()   + ' km' : '—') +
          _dItem('Distance Travelled', t['Distance Travelled'] ? Number(t['Distance Travelled']).toLocaleString() + ' km' : '—') +
          _dItem('GPS / Proof',        t['GPS/Proof Link'] ? '<a href="' + AppService.escapeHtml(t['GPS/Proof Link']) + '" target="_blank" style="color:var(--accent);">View Link <i class="fas fa-arrow-up-right-from-square"></i></a>' : '—') +
          _dItem('Remarks',            AppService.escapeHtml(t['Remarks'] || '—')) +
        '</div>';
    }

    var tId    = AppService.escapeHtml(t['Trip ID']);
    var isOwn  = String(t['Requestor Employee ID']) === String(AppService.getCurrentUser()['Employee ID']);
    var status = t['Status'];

    var footer = '<button class="btn btn-ghost" onclick="AppService.closeModal()">Close</button>';

    if (status === 'Draft' && (isOwn || AppService.hasRole('Admin'))) {
      footer +=
        '<button class="btn btn-primary" onclick="AppService.closeModal();TripsService.openForm(\'' + tId + '\')">' +
          '<i class="fas fa-pen"></i> Edit</button>' +
        '<button class="btn btn-primary" onclick="AppService.closeModal();TripsService.submitTrip(\'' + tId + '\')" style="background:var(--info);">' +
          '<i class="fas fa-paper-plane"></i> Submit</button>';
    }

    AppService.openModal('Trip Details — ' + AppService.escapeHtml(t['Trip ID']), body, footer, true);
  }

  // ── NEW / EDIT FORM ────────────────────────────────────────
  function openForm(tripId) {
    _editingId  = tripId || null;
    var appData = AppService.getAppData();
    var emps    = appData ? appData.employees   : [];
    var vehs    = appData ? appData.vehicles    : [];
    var sets    = appData ? appData.settings    : {};
    var typeOpts = (sets['Trip Type'] || []).map(function(t) { return { value: t, label: t }; });

    var t = {};
    if (tripId) {
      t = _findTrip(tripId) || {};
      if (t['Status'] !== 'Draft') {
        AppService.showToast('Only Draft trips can be edited.', 'warning');
        return;
      }
    }

    var user        = AppService.getCurrentUser();
    var reqId       = t['Requestor Employee ID'] || user['Employee ID'];
    var reqName     = t['Requestor Name']        || user['Employee Name'];

    var body =
      '<div class="section-title">Request Info</div>' +
      '<div class="form-grid">' +
        '<div class="form-group">' +
          '<label class="form-label">Requestor</label>' +
          '<input type="text" class="form-control" value="' + AppService.escapeHtml(reqName) + '" disabled/>' +
          '<input type="hidden" id="fTripReqId" value="' + AppService.escapeHtml(String(reqId)) + '"/>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Trip Type <span class="req">*</span></label>' +
          '<select class="form-control" id="fTripType">' + AppService.buildOptions(typeOpts, t['Trip Type'] || '') + '</select>' +
        '</div>' +
        '<div class="form-group form-grid-full">' +
          '<label class="form-label">Purpose <span class="req">*</span></label>' +
          '<input type="text" class="form-control" id="fTripPurpose" value="' + AppService.escapeHtml(t['Purpose'] || '') + '" placeholder="Brief description of trip purpose"/>' +
        '</div>' +
        '<div class="form-group form-grid-full">' +
          '<label class="form-label">Related JO #</label>' +
          '<input type="text" class="form-control" id="fTripJO" value="' + AppService.escapeHtml(t['Related JO'] || '') + '" placeholder="Optional job order reference"/>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">From Location <span class="req">*</span></label>' +
          '<input type="text" class="form-control" id="fTripFrom" value="' + AppService.escapeHtml(t['From Location'] || '') + '" placeholder="e.g. OPS Office, Ormoc"/>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">To Location <span class="req">*</span></label>' +
          '<input type="text" class="form-control" id="fTripTo" value="' + AppService.escapeHtml(t['To Location'] || '') + '" placeholder="e.g. Supplier Warehouse, Cebu"/>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Planned Start <span class="req">*</span></label>' +
          '<input type="datetime-local" class="form-control" id="fTripStart" value="' + _toDateTimeInput(t['Planned Start DateTime']) + '"/>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Planned End <span class="req">*</span></label>' +
          '<input type="datetime-local" class="form-control" id="fTripEnd" value="' + _toDateTimeInput(t['Planned End DateTime']) + '"/>' +
        '</div>' +
      '</div>' +

      '<div class="section-title" style="margin-top:4px;">Vehicle & Driver</div>' +
      '<div class="form-grid">' +
        '<div class="form-group">' +
          '<label class="form-label">Vehicle <span class="req">*</span></label>' +
          '<select class="form-control" id="fTripVehicle" onchange="TripsService.onVehicleChange()">' +
            AppService.buildVehicleOptions(vehs, t['Vehicle ID'] || '') +
          '</select>' +
        '</div>' +
        '<div class="form-group">' +
          '<label class="form-label">Plate Number</label>' +
          '<input type="text" class="form-control" id="fTripPlate" value="' + AppService.escapeHtml(t['Plate Number'] || '') + '" disabled placeholder="Auto-filled"/>' +
        '</div>' +
        '<div class="form-group form-grid-full">' +
          '<label class="form-label">Driver <span class="req">*</span></label>' +
          '<select class="form-control" id="fTripDriver">' +
            AppService.buildEmployeeOptions(emps, t['Driver Employee ID'] || '') +
          '</select>' +
        '</div>' +
      '</div>';

    var saveLabel  = tripId ? 'Update Draft' : 'Save as Draft';
    var footer =
      '<button class="btn btn-ghost" onclick="AppService.closeModal()">Cancel</button>' +
      '<button class="btn btn-ghost" onclick="TripsService.saveDraft()">' +
        '<i class="fas fa-floppy-disk"></i> ' + saveLabel +
      '</button>' +
      '<button class="btn btn-primary" onclick="TripsService.saveDraft(true)">' +
        '<i class="fas fa-paper-plane"></i> Save & Submit' +
      '</button>';

    AppService.openModal(tripId ? 'Edit Trip Request' : 'New Trip Request', body, footer, true);
  }

  // Auto-fill plate when vehicle changes
  function onVehicleChange() {
    var sel     = document.getElementById('fTripVehicle');
    var plate   = document.getElementById('fTripPlate');
    if (!sel || !plate) return;
    var appData = AppService.getAppData();
    if (!appData) return;
    var vehs    = appData.vehicles;
    for (var i = 0; i < vehs.length; i++) {
      if (vehs[i]['Vehicle ID'] === sel.value) {
        plate.value = vehs[i]['Plate Number'] || '';
        return;
      }
    }
    plate.value = '';
  }

  // ── SAVE DRAFT ─────────────────────────────────────────────
  function saveDraft(andSubmit) {
    var data = _collectFormData();
    if (!data) return;

    // Validate required fields for submit
    if (andSubmit) {
      var required = ['Trip Type','Purpose','From Location','To Location','Planned Start DateTime','Planned End DateTime','Vehicle ID','Driver Employee ID'];
      for (var i = 0; i < required.length; i++) {
        if (!data[required[i]]) {
          AppService.showToast(required[i] + ' is required before submitting.', 'error');
          return;
        }
      }
      data['Status'] = 'Submitted';
    } else {
      data['Status'] = 'Draft';
    }

    data['Updated By'] = AppService.getCurrentUser()['Employee Name'];
    if (_editingId) data['Trip ID'] = _editingId;

    AppService.showLoader(andSubmit ? 'Submitting trip...' : 'Saving draft...');

    google.script.run
      .withSuccessHandler(function(result) {
        AppService.hideLoader();
        if (result.success) {
          AppService.closeModal();
          AppService.showToast(result.message, 'success');
          _fetchTrips();
        } else {
          AppService.showToast(result.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        AppService.hideLoader();
        AppService.showToast('Error saving trip: ' + err.message, 'error');
      })
      .saveTrip(data);
  }

  // ── SUBMIT TRIP ────────────────────────────────────────────
  function submitTrip(tripId) {
    var t = _findTrip(tripId);
    if (!t) return;

    // Check required fields before confirming
    var required = ['Trip Type','Purpose','From Location','To Location','Planned Start DateTime','Planned End DateTime','Vehicle ID','Driver Employee ID'];
    for (var i = 0; i < required.length; i++) {
      if (!t[required[i]]) {
        AppService.showToast(required[i] + ' is required. Please edit the trip first.', 'error');
        return;
      }
    }

    AppService.confirm(
      'Submit trip <strong>' + AppService.escapeHtml(tripId) + '</strong> for approval?',
      function() {
        AppService.showLoader('Submitting...');
        google.script.run
          .withSuccessHandler(function(result) {
            AppService.hideLoader();
            if (result.success) {
              AppService.showToast(result.message, 'success');
              _fetchTrips();
            } else {
              AppService.showToast(result.message, 'error');
            }
          })
          .withFailureHandler(function(err) {
            AppService.hideLoader();
            AppService.showToast('Error: ' + err.message, 'error');
          })
          .saveTrip({
            'Trip ID':    tripId,
            'Status':     'Submitted',
            'Updated By': AppService.getCurrentUser()['Employee Name']
          });
      },
      null, false
    );
  }

  // ── CANCEL TRIP ────────────────────────────────────────────
  function cancelTrip(tripId) {
    var body =
      '<p style="color:var(--text-muted);margin-bottom:16px;">Please provide a reason for cancellation.</p>' +
      '<div class="form-group">' +
        '<label class="form-label">Cancel Reason <span class="req">*</span></label>' +
        '<textarea class="form-control" id="cancelReasonInput" rows="3" placeholder="Reason for cancelling this trip..."></textarea>' +
      '</div>';

    var footer =
      '<button class="btn btn-ghost" onclick="AppService.closeModal()">Back</button>' +
      '<button class="btn btn-warning" onclick="TripsService.confirmCancel(\'' + AppService.escapeHtml(tripId) + '\')">' +
        '<i class="fas fa-ban"></i> Confirm Cancel' +
      '</button>';

    AppService.openModal('Cancel Trip — ' + AppService.escapeHtml(tripId), body, footer);
  }

  function confirmCancel(tripId) {
    var reason = document.getElementById('cancelReasonInput');
    if (!reason || !reason.value.trim()) {
      AppService.showToast('Cancel reason is required.', 'error');
      return;
    }

    AppService.showLoader('Cancelling trip...');
    google.script.run
      .withSuccessHandler(function(result) {
        AppService.hideLoader();
        AppService.closeModal();
        if (result.success) {
          AppService.showToast(result.message, 'success');
          _fetchTrips();
        } else {
          AppService.showToast(result.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        AppService.hideLoader();
        AppService.showToast('Error: ' + err.message, 'error');
      })
      .saveTrip({
        'Trip ID':       tripId,
        'Status':        'Cancelled',
        'Cancel Reason': reason.value.trim(),
        'Updated By':    AppService.getCurrentUser()['Employee Name']
      });
  }

  // ── HELPERS ─────────────────────────────────────────────────
  function _collectFormData() {
    var tripType = document.getElementById('fTripType')    ? document.getElementById('fTripType').value    : '';
    var purpose  = document.getElementById('fTripPurpose') ? document.getElementById('fTripPurpose').value.trim() : '';

    if (!purpose) {
      AppService.showToast('Purpose is required.', 'error');
      return null;
    }

    return {
      'Requestor Employee ID':  document.getElementById('fTripReqId')  ? document.getElementById('fTripReqId').value    : '',
      'Trip Type':              tripType,
      'Purpose':                purpose,
      'Related JO':             document.getElementById('fTripJO')      ? document.getElementById('fTripJO').value.trim()      : '',
      'From Location':          document.getElementById('fTripFrom')    ? document.getElementById('fTripFrom').value.trim()    : '',
      'To Location':            document.getElementById('fTripTo')      ? document.getElementById('fTripTo').value.trim()      : '',
      'Planned Start DateTime': document.getElementById('fTripStart')   ? document.getElementById('fTripStart').value          : '',
      'Planned End DateTime':   document.getElementById('fTripEnd')     ? document.getElementById('fTripEnd').value            : '',
      'Vehicle ID':             document.getElementById('fTripVehicle') ? document.getElementById('fTripVehicle').value        : '',
      'Driver Employee ID':     document.getElementById('fTripDriver')  ? document.getElementById('fTripDriver').value         : ''
    };
  }

  function _findTrip(tripId) {
    for (var i = 0; i < _allTrips.length; i++) {
      if (_allTrips[i]['Trip ID'] === tripId) return _allTrips[i];
    }
    return null;
  }

  function _dItem(label, value) {
    return '<div class="detail-item">' +
      '<div class="detail-label">' + label + '</div>' +
      '<div class="detail-value">'  + value + '</div>' +
    '</div>';
  }

  function _toDateTimeInput(val) {
    if (!val) return '';
    var d = new Date(val);
    if (isNaN(d.getTime())) return '';
    var pad = function(n) { return String(n).padStart(2, '0'); };
    return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()) +
      'T' + pad(d.getHours()) + ':' + pad(d.getMinutes());
  }

  // ── PUBLIC ──────────────────────────────────────────────────
  return {
    load          : load,
    applyFilter   : applyFilter,
    openForm      : openForm,
    saveDraft     : saveDraft,
    submitTrip    : submitTrip,
    cancelTrip    : cancelTrip,
    confirmCancel : confirmCancel,
    viewTrip      : viewTrip,
    onVehicleChange : onVehicleChange
  };

})();
</script>
