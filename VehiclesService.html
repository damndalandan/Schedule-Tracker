<script>
// ============================================================
// VehiclesService.html — Vehicles Page Logic
// ============================================================

var VehiclesService = (function() {

  var _allVehicles = [];
  var _editingId   = null;

  // Hardcoded defaults — always visible even if Settings sheet is empty
  var DEFAULT_VEHICLE_TYPES  = ['Van', 'Truck', 'Motorcycle', 'Car', 'Tricycle'];
  var DEFAULT_VEHICLE_STATUS = ['Active', 'Under Repair', 'Inactive'];

  // ── LOAD ───────────────────────────────────────────────────
  function load() {
    _populateTypeFilter();
    _fetchVehicles();
  }

  function _getVehicleTypes() {
    // Merge hardcoded defaults + settings + existing vehicle types (unique)
    var appData  = AppService.getAppData();
    var fromSettings = (appData && appData.settings && appData.settings['Vehicle Type'])
      ? appData.settings['Vehicle Type'] : [];
    var all = DEFAULT_VEHICLE_TYPES.slice();
    for (var i = 0; i < fromSettings.length; i++) {
      if (all.indexOf(fromSettings[i]) === -1) all.push(fromSettings[i]);
    }
    for (var j = 0; j < _allVehicles.length; j++) {
      var t = _allVehicles[j]['Vehicle Type'];
      if (t && all.indexOf(t) === -1) all.push(t);
    }
    return all;
  }

  function _populateTypeFilter() {
    var sel = document.getElementById('vehFilterType');
    if (!sel) return;
    while (sel.options.length > 1) sel.remove(1);
    var types = _getVehicleTypes();
    for (var i = 0; i < types.length; i++) {
      var opt = document.createElement('option');
      opt.value = types[i];
      opt.textContent = types[i];
      sel.appendChild(opt);
    }
  }

  function _fetchVehicles() {
    var tbody = document.getElementById('vehiclesTableBody');
    if (tbody) {
      tbody.innerHTML = '<tr><td colspan="9" class="table-empty"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
    }
    google.script.run
      .withSuccessHandler(function(vehicles) {
        _allVehicles = vehicles;
        _populateTypeFilter();
        applyFilter();
      })
      .withFailureHandler(function() {
        if (tbody) tbody.innerHTML = '<tr><td colspan="9" class="table-empty">Failed to load vehicles.</td></tr>';
        AppService.showToast('Failed to load vehicles.', 'error');
      })
      .getVehicles();
  }

  // ── FILTER ─────────────────────────────────────────────────
  function applyFilter() {
    var search = (document.getElementById('vehSearch')      ? document.getElementById('vehSearch').value      : '').toLowerCase();
    var status = document.getElementById('vehFilterStatus') ? document.getElementById('vehFilterStatus').value : '';
    var type   = document.getElementById('vehFilterType')   ? document.getElementById('vehFilterType').value   : '';

    var filtered = _allVehicles.filter(function(v) {
      var matchSearch = !search ||
        (v['Plate Number'] || '').toLowerCase().indexOf(search) > -1 ||
        (v['Brand/Model']  || '').toLowerCase().indexOf(search) > -1 ||
        (v['Vehicle Type'] || '').toLowerCase().indexOf(search) > -1 ||
        (v['Vehicle ID']   || '').toLowerCase().indexOf(search) > -1;
      var matchStatus = !status || v['Status'] === status;
      var matchType   = !type   || v['Vehicle Type'] === type;
      return matchSearch && matchStatus && matchType;
    });

    _renderTable(filtered);
  }

  // ── RENDER TABLE ───────────────────────────────────────────
  function _renderTable(vehicles) {
    var tbody = document.getElementById('vehiclesTableBody');
    if (!tbody) return;

    if (vehicles.length === 0) {
      tbody.innerHTML = '<tr><td colspan="9" class="table-empty">No vehicles found.</td></tr>';
      return;
    }

    var rows = '';
    for (var i = 0; i < vehicles.length; i++) {
      var v        = vehicles[i];
      var insAlert = _expiryClass(v['Insurance Expiry Date']);
      var ltoAlert = _expiryClass(v['LTO Expiry Date']);
      var vId      = AppService.escapeHtml(v['Vehicle ID']);
      var vStatus  = AppService.escapeHtml(v['Status']);

      var isInactive  = v['Status'] === 'Inactive';
      var toggleColor = isInactive ? 'var(--success)' : 'var(--danger)';
      var toggleIcon  = isInactive ? 'fa-circle-check' : 'fa-ban';
      var toggleTitle = isInactive ? 'Activate' : 'Deactivate';

      var editBtns =
        '<button class="btn btn-ghost btn-sm btn-icon" title="View" ' +
          'onclick="VehiclesService.viewVehicle(\'' + vId + '\')">' +
          '<i class="fas fa-eye"></i></button>' +
        '<button class="btn btn-ghost btn-sm btn-icon" title="Edit" ' +
          'onclick="VehiclesService.openForm(\'' + vId + '\')">' +
          '<i class="fas fa-pen"></i></button>' +
        '<button class="btn btn-ghost btn-sm btn-icon" title="' + toggleTitle + '" ' +
          'style="color:' + toggleColor + ';" ' +
          'onclick="VehiclesService.toggleStatus(\'' + vId + '\',\'' + vStatus + '\')">' +
          '<i class="fas ' + toggleIcon + '"></i></button>';

      rows +=
        '<tr>' +
          '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--accent);">' + vId + '</span></td>' +
          '<td><strong>' + AppService.escapeHtml(v['Plate Number']) + '</strong></td>' +
          '<td>' + AppService.escapeHtml(v['Vehicle Type'] || '—') + '</td>' +
          '<td>' + AppService.escapeHtml(v['Brand/Model']  || '—') + '</td>' +
          '<td>' + AppService.vehicleStatusBadge(v['Status']) + '</td>' +
          '<td><span style="color:' + insAlert.color + ';font-size:13px;">' +
            AppService.formatDate(v['Insurance Expiry Date']) +
            (insAlert.icon ? ' <i class="fas ' + insAlert.icon + '"></i>' : '') +
          '</span></td>' +
          '<td><span style="color:' + ltoAlert.color + ';font-size:13px;">' +
            AppService.formatDate(v['LTO Expiry Date']) +
            (ltoAlert.icon ? ' <i class="fas ' + ltoAlert.icon + '"></i>' : '') +
          '</span></td>' +
          '<td class="muted">' + (v['Beginning Mileage'] ? Number(v['Beginning Mileage']).toLocaleString() + ' km' : '—') + '</td>' +
          '<td style="text-align:right;white-space:nowrap;">' +
            '<div class="action-row" style="justify-content:flex-end;">' + editBtns + '</div>' +
          '</td>' +
        '</tr>';
    }
    tbody.innerHTML = rows;
  }

  function _expiryClass(dateVal) {
    if (!dateVal) return { color: 'var(--text-muted)', icon: '' };
    var today  = new Date(); today.setHours(0,0,0,0);
    var expiry = new Date(dateVal); expiry.setHours(0,0,0,0);
    var days   = Math.round((expiry - today) / 86400000);
    if (days < 0)   return { color: 'var(--danger)',  icon: 'fa-circle-exclamation' };
    if (days <= 30) return { color: 'var(--warning)', icon: 'fa-triangle-exclamation' };
    return { color: 'var(--text)', icon: '' };
  }

  // ── VIEW VEHICLE ───────────────────────────────────────────
  function viewVehicle(vehicleId) {
    var v = _findVehicle(vehicleId);
    if (!v) return;

    var insLink = v['Insurance PDF Link']
      ? '<a href="' + AppService.escapeHtml(v['Insurance PDF Link']) + '" target="_blank" style="color:var(--accent);">View PDF <i class="fas fa-arrow-up-right-from-square"></i></a>'
      : '—';
    var ltoLink = v['LTO PDF Link']
      ? '<a href="' + AppService.escapeHtml(v['LTO PDF Link']) + '" target="_blank" style="color:var(--accent);">View PDF <i class="fas fa-arrow-up-right-from-square"></i></a>'
      : '—';

    var body =
      '<div class="detail-grid">' +
        _dItem('Vehicle ID',      '<span style="font-family:var(--font-mono);color:var(--accent);">' + AppService.escapeHtml(v['Vehicle ID']) + '</span>') +
        _dItem('Plate Number',    '<strong>' + AppService.escapeHtml(v['Plate Number']) + '</strong>') +
        _dItem('Vehicle Type',    AppService.escapeHtml(v['Vehicle Type']  || '—')) +
        _dItem('Brand / Model',   AppService.escapeHtml(v['Brand/Model']   || '—')) +
        _dItem('Status',          AppService.vehicleStatusBadge(v['Status'])) +
        _dItem('Beg. Mileage',    v['Beginning Mileage'] ? Number(v['Beginning Mileage']).toLocaleString() + ' km' : '—') +
        '<hr class="detail-divider"/>' +
        _dItem('Insurance Expiry', AppService.formatDate(v['Insurance Expiry Date'])) +
        _dItem('Insurance PDF',    insLink) +
        _dItem('LTO Expiry',       AppService.formatDate(v['LTO Expiry Date'])) +
        _dItem('LTO PDF',          ltoLink) +
        '<hr class="detail-divider"/>' +
        _dItem('Notes',      AppService.escapeHtml(v['Notes']      || '—')) +
        _dItem('Created At', AppService.formatDateTime(v['Created At'])) +
      '</div>';

    var vId    = AppService.escapeHtml(v['Vehicle ID']);
    var footer =
      '<button class="btn btn-ghost" onclick="AppService.closeModal()">Close</button>' +
      '<button class="btn btn-primary" onclick="AppService.closeModal();VehiclesService.openForm(\'' + vId + '\')"><i class="fas fa-pen"></i> Edit</button>';

    AppService.openModal('Vehicle — ' + AppService.escapeHtml(v['Plate Number']), body, footer);
  }

  function _dItem(label, value) {
    return '<div class="detail-item">' +
      '<div class="detail-label">' + label + '</div>' +
      '<div class="detail-value">'  + value + '</div>' +
    '</div>';
  }

  // ── ADD / EDIT FORM ────────────────────────────────────────
  function openForm(vehicleId) {
    _editingId = vehicleId || null;
    var v = vehicleId ? (_findVehicle(vehicleId) || {}) : {};

    // Build Vehicle Type options — hardcoded defaults + any from DB
    var knownTypes = _getVehicleTypes();
    var typeOptsHtml = '';
    // Add blank first option for new vehicle
    if (!vehicleId) typeOptsHtml += '<option value="">— Select or type below —</option>';
    for (var i = 0; i < knownTypes.length; i++) {
      var sel = (v['Vehicle Type'] === knownTypes[i]) ? ' selected' : '';
      typeOptsHtml += '<option value="' + AppService.escapeHtml(knownTypes[i]) + '"' + sel + '>' + AppService.escapeHtml(knownTypes[i]) + '</option>';
    }
    typeOptsHtml += '<option value="__custom__">+ Add new type...</option>';

    // Build Status options — always hardcoded
    var statusOptsHtml =
      '<option value="Active"'       + ((!v['Status'] || v['Status'] === 'Active')   ? ' selected' : '') + '>Active</option>' +
      '<option value="Under Repair"' + (v['Status'] === 'Under Repair'               ? ' selected' : '') + '>Under Repair</option>' +
      '<option value="Inactive"'     + (v['Status'] === 'Inactive'                   ? ' selected' : '') + '>Inactive</option>';

    var body =
      '<div class="form-grid">' +

        // Plate Number
        '<div class="form-group">' +
          '<label class="form-label">Plate Number <span class="req">*</span></label>' +
          '<input type="text" class="form-control" id="fVehPlate" value="' + AppService.escapeHtml(v['Plate Number'] || '') + '" placeholder="e.g. ABC 1234" maxlength="20"/>' +
        '</div>' +

        // Vehicle Type — dropdown + custom input
        '<div class="form-group">' +
          '<label class="form-label">Vehicle Type <span class="req">*</span></label>' +
          '<select class="form-control" id="fVehTypeSelect" onchange="VehiclesService._onTypeChange()">' +
            typeOptsHtml +
          '</select>' +
          '<input type="text" class="form-control" id="fVehTypeCustom" placeholder="Type new vehicle type..." ' +
            'style="margin-top:6px;display:none;" maxlength="50"/>' +
        '</div>' +

        // Brand / Model
        '<div class="form-group form-grid-full">' +
          '<label class="form-label">Brand / Model</label>' +
          '<input type="text" class="form-control" id="fVehModel" value="' + AppService.escapeHtml(v['Brand/Model'] || '') + '" placeholder="e.g. Toyota Hi-Ace"/>' +
        '</div>' +

        // Beginning Mileage
        '<div class="form-group">' +
          '<label class="form-label">Beginning Mileage (km)</label>' +
          '<input type="number" class="form-control" id="fVehMileage" value="' + (v['Beginning Mileage'] || '') + '" min="0" placeholder="0"/>' +
        '</div>' +

        // Status — always hardcoded
        '<div class="form-group">' +
          '<label class="form-label">Status <span class="req">*</span></label>' +
          '<select class="form-control" id="fVehStatus">' + statusOptsHtml + '</select>' +
        '</div>' +

        // Insurance Expiry
        '<div class="form-group">' +
          '<label class="form-label">Insurance Expiry Date</label>' +
          '<input type="date" class="form-control" id="fVehInsExpiry" value="' + _toDateInput(v['Insurance Expiry Date']) + '"/>' +
        '</div>' +

        // Insurance PDF Link
        '<div class="form-group">' +
          '<label class="form-label">Insurance PDF Link</label>' +
          '<input type="url" class="form-control" id="fVehInsLink" value="' + AppService.escapeHtml(v['Insurance PDF Link'] || '') + '" placeholder="https://drive.google.com/..."/>' +
        '</div>' +

        // LTO Expiry
        '<div class="form-group">' +
          '<label class="form-label">LTO Expiry Date</label>' +
          '<input type="date" class="form-control" id="fVehLtoExpiry" value="' + _toDateInput(v['LTO Expiry Date']) + '"/>' +
        '</div>' +

        // LTO PDF Link
        '<div class="form-group">' +
          '<label class="form-label">LTO PDF Link</label>' +
          '<input type="url" class="form-control" id="fVehLtoLink" value="' + AppService.escapeHtml(v['LTO PDF Link'] || '') + '" placeholder="https://drive.google.com/..."/>' +
        '</div>' +

        // Notes
        '<div class="form-group form-grid-full">' +
          '<label class="form-label">Notes</label>' +
          '<textarea class="form-control" id="fVehNotes" rows="2" placeholder="Optional notes...">' + AppService.escapeHtml(v['Notes'] || '') + '</textarea>' +
        '</div>' +

      '</div>';

    var footer =
      '<button class="btn btn-ghost" onclick="AppService.closeModal()">Cancel</button>' +
      '<button class="btn btn-primary" onclick="VehiclesService.saveVehicle()">' +
        '<i class="fas fa-floppy-disk"></i> ' + (vehicleId ? 'Update Vehicle' : 'Save Vehicle') +
      '</button>';

    AppService.openModal(vehicleId ? 'Edit Vehicle' : 'Add Vehicle', body, footer);
  }

  // Show/hide custom type input when "+ Add new type..." is selected
  function _onTypeChange() {
    var sel    = document.getElementById('fVehTypeSelect');
    var custom = document.getElementById('fVehTypeCustom');
    if (!sel || !custom) return;
    if (sel.value === '__custom__') {
      custom.style.display = 'block';
      custom.focus();
    } else {
      custom.style.display = 'none';
      custom.value = '';
    }
  }

  // ── SAVE VEHICLE ───────────────────────────────────────────
  function saveVehicle() {
    // Get vehicle type — if custom selected, use the text input
    var typeSelect = document.getElementById('fVehTypeSelect');
    var typeCustom = document.getElementById('fVehTypeCustom');
    var vehicleType = '';
    if (typeSelect) {
      if (typeSelect.value === '__custom__') {
        vehicleType = typeCustom ? typeCustom.value.trim() : '';
      } else {
        vehicleType = typeSelect.value;
      }
    }

    var data = {
      'Plate Number':          (document.getElementById('fVehPlate')     ? document.getElementById('fVehPlate').value.trim()  : ''),
      'Vehicle Type':          vehicleType,
      'Brand/Model':           (document.getElementById('fVehModel')     ? document.getElementById('fVehModel').value.trim()  : ''),
      'Beginning Mileage':     (document.getElementById('fVehMileage')   ? document.getElementById('fVehMileage').value        : ''),
      'Status':                (document.getElementById('fVehStatus')    ? document.getElementById('fVehStatus').value         : 'Active'),
      'Insurance Expiry Date': (document.getElementById('fVehInsExpiry') ? document.getElementById('fVehInsExpiry').value      : ''),
      'Insurance PDF Link':    (document.getElementById('fVehInsLink')   ? document.getElementById('fVehInsLink').value.trim() : ''),
      'LTO Expiry Date':       (document.getElementById('fVehLtoExpiry') ? document.getElementById('fVehLtoExpiry').value      : ''),
      'LTO PDF Link':          (document.getElementById('fVehLtoLink')   ? document.getElementById('fVehLtoLink').value.trim() : ''),
      'Notes':                 (document.getElementById('fVehNotes')     ? document.getElementById('fVehNotes').value.trim()   : '')
    };

    if (_editingId) data['Vehicle ID'] = _editingId;

    if (!data['Plate Number']) { AppService.showToast('Plate Number is required.', 'error'); return; }
    if (!data['Vehicle Type']) { AppService.showToast('Vehicle Type is required. Select one or type a new type.', 'error'); return; }

    AppService.showLoader(_editingId ? 'Updating vehicle...' : 'Saving vehicle...');

    google.script.run
      .withSuccessHandler(function(result) {
        AppService.hideLoader();
        if (result.success) {
          AppService.closeModal();
          AppService.showToast(result.message, 'success');
          _fetchVehicles();
          AppService.refreshAppData();
        } else {
          AppService.showToast(result.message, 'error');
        }
      })
      .withFailureHandler(function(err) {
        AppService.hideLoader();
        AppService.showToast('Error saving vehicle: ' + err.message, 'error');
      })
      .saveVehicle(data);
  }

  // ── TOGGLE STATUS ──────────────────────────────────────────
  function toggleStatus(vehicleId, currentStatus) {
    var newStatus  = currentStatus === 'Inactive' ? 'Active' : 'Inactive';
    var actionText = newStatus === 'Inactive' ? 'deactivate' : 'reactivate';

    AppService.confirm(
      'Are you sure you want to ' + actionText + ' this vehicle?',
      function() {
        AppService.showLoader('Updating status...');
        google.script.run
          .withSuccessHandler(function(result) {
            AppService.hideLoader();
            if (result.success) {
              AppService.showToast(result.message, 'success');
              _fetchVehicles();
              AppService.refreshAppData();
            } else {
              AppService.showToast(result.message, 'error');
            }
          })
          .withFailureHandler(function(err) {
            AppService.hideLoader();
            AppService.showToast('Error: ' + err.message, 'error');
          })
          .saveVehicle({ 'Vehicle ID': vehicleId, 'Status': newStatus });
      },
      null,
      newStatus === 'Inactive'
    );
  }

  // ── HELPERS ─────────────────────────────────────────────────
  function _findVehicle(vehicleId) {
    for (var i = 0; i < _allVehicles.length; i++) {
      if (_allVehicles[i]['Vehicle ID'] === vehicleId) return _allVehicles[i];
    }
    return null;
  }

  function _toDateInput(val) {
    if (!val) return '';
    var d = new Date(val);
    if (isNaN(d.getTime())) return '';
    var mm = String(d.getMonth() + 1).padStart(2, '0');
    var dd = String(d.getDate()).padStart(2, '0');
    return d.getFullYear() + '-' + mm + '-' + dd;
  }

  // ── PUBLIC ──────────────────────────────────────────────────
  return {
    load          : load,
    applyFilter   : applyFilter,
    openForm      : openForm,
    saveVehicle   : saveVehicle,
    viewVehicle   : viewVehicle,
    toggleStatus  : toggleStatus,
    _onTypeChange : _onTypeChange   // exposed for inline onchange
  };

})();
</script>
