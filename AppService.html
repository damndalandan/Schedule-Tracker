<script>
// ============================================================
// AppService.html — Core Application Service
// Save this file as: AppService.html in Apps Script
// ============================================================

var AppService = (function() {

  // ── STATE ──────────────────────────────────────────────────
  var _currentUser = null;
  var _appData     = null;
  var _currentPage = null;

  // ── INIT ───────────────────────────────────────────────────
  function init() {
    _updateTopbarDate();
    setInterval(_updateTopbarDate, 60000);
    _loadEmployeesForSplash();
  }

  function _updateTopbarDate() {
    var el = document.getElementById('topbarDate');
    if (el) {
      el.textContent = new Date().toLocaleDateString('en-PH', {
        weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
      });
    }
  }

  // ── SPLASH / LOGIN ─────────────────────────────────────────
  function _loadEmployeesForSplash() {
    // Show loading state inside splash card
    var sel        = document.getElementById('userSelect');
    var loginBtn   = document.getElementById('loginBtn');
    var retryBtn   = document.getElementById('splashRetryBtn');
    var splashMsg  = document.getElementById('splashLoadingMsg');

    if (sel)       { sel.disabled = true; sel.innerHTML = '<option value="">Loading employees...</option>'; }
    if (loginBtn)  { loginBtn.disabled = true; }
    if (retryBtn)  { retryBtn.classList.add('hidden'); }
    if (splashMsg) { splashMsg.classList.remove('hidden'); }

    google.script.run
      .withSuccessHandler(function(data) {
        if (splashMsg) splashMsg.classList.add('hidden');

        if (!data || !data.success) {
          _onSplashLoadError('Failed to load employee list. Please retry.');
          return;
        }

        _appData = data;

        // Populate dropdown
        if (sel) {
          sel.innerHTML = '<option value="">— Select your name —</option>';
          data.employees.forEach(function(emp) {
            if (emp['Status'] === 'Active') {
              var opt = document.createElement('option');
              opt.value       = emp['Employee ID'];
              opt.textContent = emp['Employee Name'] + ' (' + emp['Role'] + ')';
              sel.appendChild(opt);
            }
          });
          sel.disabled = false;
        }

        if (loginBtn) loginBtn.disabled = false;
      })
      .withFailureHandler(function(err) {
        if (splashMsg) splashMsg.classList.add('hidden');
        var msg = (err && err.message) ? err.message : 'Connection error. Please retry.';
        _onSplashLoadError(msg);
      })
      .getAppData();
  }

  function _onSplashLoadError(msg) {
    var sel       = document.getElementById('userSelect');
    var loginBtn  = document.getElementById('loginBtn');
    var retryBtn  = document.getElementById('splashRetryBtn');
    var splashErr = document.getElementById('splashError');

    if (sel)      { sel.disabled = true; sel.innerHTML = '<option value="">— Failed to load —</option>'; }
    if (loginBtn) { loginBtn.disabled = true; }
    if (retryBtn) { retryBtn.classList.remove('hidden'); }
    if (splashErr){ splashErr.textContent = msg; splashErr.classList.remove('hidden'); }
  }

  // Called by retry button in splash card
  function retryLoadEmployees() {
    var splashErr = document.getElementById('splashError');
    if (splashErr) splashErr.classList.add('hidden');
    _loadEmployeesForSplash();
  }

  function loginUser() {
    var sel = document.getElementById('userSelect');
    var err = document.getElementById('splashError');

    // Guard: appData not loaded yet
    if (!_appData) {
      if (err) { err.textContent = 'Employee data not loaded yet. Please wait or retry.'; err.classList.remove('hidden'); }
      return;
    }

    if (!sel || !sel.value) {
      if (err) { err.textContent = 'Please select your name to continue.'; err.classList.remove('hidden'); }
      return;
    }

    if (err) err.classList.add('hidden');

    var emp = null;
    for (var i = 0; i < _appData.employees.length; i++) {
      if (String(_appData.employees[i]['Employee ID']) === String(sel.value)) {
        emp = _appData.employees[i];
        break;
      }
    }

    if (!emp) {
      showToast('Employee not found. Please retry.', 'error');
      return;
    }

    _currentUser = emp;
    _renderUserUI();
    _applyRoleVisibility();
    document.getElementById('splashScreen').classList.add('hidden');
    document.getElementById('mainApp').classList.remove('hidden');
    navigate('dashboard');
  }

  function logout() {
    _currentUser = null;
    _currentPage = null;
    _appData     = null;
    document.getElementById('mainApp').classList.add('hidden');
    document.getElementById('splashScreen').classList.remove('hidden');
    // Reset splash state and reload employees fresh
    var err = document.getElementById('splashError');
    if (err) err.classList.add('hidden');
    _loadEmployeesForSplash();
  }

  function _renderUserUI() {
    var name    = _currentUser['Employee Name'] || '?';
    var role    = _currentUser['Role']          || '—';
    var words   = name.split(' ');
    var initials = '';
    for (var i = 0; i < Math.min(words.length, 2); i++) {
      if (words[i]) initials += words[i][0].toUpperCase();
    }

    document.getElementById('sidebarAvatar').textContent   = initials;
    document.getElementById('sidebarUserName').textContent = name;
    document.getElementById('sidebarUserRole').textContent = role;
    document.getElementById('topbarAvatar').textContent    = initials;
    document.getElementById('topbarUserName').textContent  = name;
  }

  function _applyRoleVisibility() {
    var role  = _currentUser['Role'];
    var items = document.querySelectorAll('.nav-item-role');
    for (var i = 0; i < items.length; i++) {
      var roles = (items[i].dataset.roles || '').split(',');
      var found = false;
      for (var j = 0; j < roles.length; j++) {
        if (roles[j].trim() === role) { found = true; break; }
      }
      items[i].style.display = found ? '' : 'none';
    }
  }

  function getCurrentUser() { return _currentUser; }
  function getAppData()     { return _appData; }

  function refreshAppData() {
    google.script.run
      .withSuccessHandler(function(data) {
        if (data && data.success) _appData = data;
      })
      .withFailureHandler(function() {})
      .getAppData();
  }

  // ── NAVIGATION ─────────────────────────────────────────────
  function navigate(page) {
    var pages = document.querySelectorAll('.page');
    for (var i = 0; i < pages.length; i++) {
      pages[i].classList.add('hidden');
    }

    var target = document.getElementById('page-' + page);
    if (!target) return;
    target.classList.remove('hidden');

    var navItems = document.querySelectorAll('.nav-item');
    for (var j = 0; j < navItems.length; j++) {
      if (navItems[j].dataset.page === page) {
        navItems[j].classList.add('active');
      } else {
        navItems[j].classList.remove('active');
      }
    }

    var titles = {
      dashboard:     'Dashboard',
      trips:         'Trip Requests',
      approval:      'Approval',
      completion:    'Trip Completion',
      vehicles:      'Vehicles',
      renewalAlerts: 'Renewal Alerts',
      reports:       'Reports'
    };
    var titleEl = document.getElementById('pageTitle');
    if (titleEl) titleEl.textContent = titles[page] || page;

    _currentPage = page;

    // Fire page load functions
    if (page === 'dashboard'     && typeof DashboardService     !== 'undefined') DashboardService.load();
    if (page === 'trips'         && typeof TripsService         !== 'undefined') TripsService.load();
    if (page === 'approval'      && typeof ApprovalService      !== 'undefined') ApprovalService.load();
    if (page === 'completion'    && typeof CompletionService    !== 'undefined') CompletionService.load();
    if (page === 'vehicles'      && typeof VehiclesService      !== 'undefined') VehiclesService.load();
    if (page === 'renewalAlerts' && typeof RenewalAlertsService !== 'undefined') RenewalAlertsService.load();
    if (page === 'reports'       && typeof ReportsService       !== 'undefined') ReportsService.load();

    // Close sidebar on mobile
    if (window.innerWidth <= 768) {
      document.getElementById('sidebar').classList.add('collapsed');
    }
  }

  // ── SIDEBAR ─────────────────────────────────────────────────
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('collapsed');
  }

  // ── MODAL ───────────────────────────────────────────────────
  function openModal(title, bodyHtml, footerHtml, large) {
    document.getElementById('modalTitle').textContent  = title;
    document.getElementById('modalBody').innerHTML     = bodyHtml;
    document.getElementById('modalFooter').innerHTML   = footerHtml || '';
    var box = document.getElementById('modalBox');
    if (large) {
      box.classList.add('modal-lg');
    } else {
      box.classList.remove('modal-lg');
    }
    document.getElementById('globalModal').classList.remove('hidden');
  }

  function closeModal() {
    document.getElementById('globalModal').classList.add('hidden');
    document.getElementById('modalBody').innerHTML   = '';
    document.getElementById('modalFooter').innerHTML = '';
  }

  // ── TOAST ───────────────────────────────────────────────────
  function showToast(message, type, duration) {
    type     = type     || 'info';
    duration = duration || 3500;

    var icons = {
      success: 'fa-circle-check',
      error:   'fa-circle-xmark',
      warning: 'fa-triangle-exclamation',
      info:    'fa-circle-info'
    };

    var toast = document.createElement('div');
    toast.className = 'toast toast-' + (type === 'error' ? 'error' : type);
    toast.innerHTML =
      '<i class="fas ' + (icons[type] || icons.info) + ' toast-icon"></i>' +
      '<span>' + message + '</span>';

    document.getElementById('toastContainer').appendChild(toast);

    setTimeout(function() {
      toast.style.opacity    = '0';
      toast.style.transition = 'opacity 0.3s';
      setTimeout(function() { toast.remove(); }, 300);
    }, duration);
  }

  // ── LOADER ──────────────────────────────────────────────────
  function showLoader(text) {
    document.getElementById('loaderText').textContent = text || 'Loading...';
    document.getElementById('globalLoader').classList.remove('hidden');
  }

  function hideLoader() {
    document.getElementById('globalLoader').classList.add('hidden');
  }

  // ── CONFIRM ─────────────────────────────────────────────────
  function confirm(message, onConfirm, onCancel, danger) {
    var isDanger = (danger !== false);
    var body     = '<p style="color:var(--text-muted);font-size:14px;line-height:1.6;">' + message + '</p>';
    var footer   =
      '<button class="btn btn-ghost" onclick="AppService.closeModal()">' +
        (onCancel ? 'Cancel' : 'Cancel') +
      '</button>' +
      '<button class="btn ' + (isDanger ? 'btn-danger' : 'btn-primary') + '" id="confirmOkBtn">Confirm</button>';

    openModal('Confirm', body, footer);

    setTimeout(function() {
      var btn = document.getElementById('confirmOkBtn');
      if (btn) {
        btn.addEventListener('click', function() {
          closeModal();
          if (typeof onConfirm === 'function') onConfirm();
        });
      }
    }, 50);
  }

  // ── DATE FORMATTERS ─────────────────────────────────────────
  function formatDate(val) {
    if (!val) return '—';
    var d = new Date(val);
    if (isNaN(d.getTime())) return String(val);
    return d.toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function formatDateTime(val) {
    if (!val) return '—';
    var d = new Date(val);
    if (isNaN(d.getTime())) return String(val);
    return d.toLocaleDateString('en-PH', { year: 'numeric', month: 'short', day: 'numeric' }) +
      ' ' + d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
  }

  // ── BADGES ──────────────────────────────────────────────────
  function statusBadge(status) {
    var map = {
      'Draft':     'badge-draft',
      'Submitted': 'badge-submitted',
      'Approved':  'badge-approved',
      'Rejected':  'badge-rejected',
      'Cancelled': 'badge-cancelled',
      'Completed': 'badge-completed'
    };
    var cls = map[status] || 'badge-draft';
    return '<span class="badge ' + cls + '">' + escapeHtml(String(status || '—')) + '</span>';
  }

  function vehicleStatusBadge(status) {
    var map = {
      'Active':       'badge-active',
      'Under Repair': 'badge-repair',
      'Inactive':     'badge-inactive'
    };
    var cls = map[status] || 'badge-draft';
    return '<span class="badge ' + cls + '">' + escapeHtml(String(status || '—')) + '</span>';
  }

  function alertBadge(status) {
    var map = {
      'OK':             'badge-ok',
      'Due in 30 Days': 'badge-due',
      'Expired':        'badge-expired'
    };
    var cls = map[status] || 'badge-draft';
    return '<span class="badge ' + cls + '">' + escapeHtml(String(status || '—')) + '</span>';
  }

  // ── OPTIONS BUILDERS ────────────────────────────────────────
  function buildOptions(items, selectedVal) {
    var html = '';
    for (var i = 0; i < items.length; i++) {
      var item     = items[i];
      var val      = (item && item.value !== undefined) ? item.value : item;
      var label    = item.label || item.value || item;
      var selected = String(val) === String(selectedVal || '') ? ' selected' : '';
      html += '<option value="' + escapeHtml(String(val)) + '"' + selected + '>' + escapeHtml(String(label)) + '</option>';
    }
    return html;
  }

  function buildEmployeeOptions(employees, selectedId, roleFilter) {
    var list = roleFilter
      ? employees.filter(function(e) { return e['Role'] === roleFilter; })
      : employees;
    return buildOptions(
      list.map(function(e) { return { value: e['Employee ID'], label: e['Employee Name'] }; }),
      selectedId
    );
  }

  function buildVehicleOptions(vehicles, selectedId) {
    return buildOptions(
      vehicles.map(function(v) {
        return {
          value: v['Vehicle ID'],
          label: v['Plate Number'] + ' — ' + (v['Brand/Model'] || v['Vehicle Type'])
        };
      }),
      selectedId
    );
  }

  function hasRole() {
    if (!_currentUser) return false;
    for (var i = 0; i < arguments.length; i++) {
      if (_currentUser['Role'] === arguments[i]) return true;
    }
    return false;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g,  '&amp;')
      .replace(/</g,  '&lt;')
      .replace(/>/g,  '&gt;')
      .replace(/"/g,  '&quot;')
      .replace(/'/g,  '&#39;');
  }

  // ── BOOT ────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('globalModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    init();
  });

  // ── PUBLIC API ───────────────────────────────────────────────
  return {
    init                 : init,
    loginUser            : loginUser,
    retryLoadEmployees   : retryLoadEmployees,
    logout               : logout,
    getCurrentUser       : getCurrentUser,
    getAppData           : getAppData,
    refreshAppData       : refreshAppData,
    navigate             : navigate,
    toggleSidebar        : toggleSidebar,
    openModal            : openModal,
    closeModal           : closeModal,
    confirm              : confirm,
    showToast            : showToast,
    showLoader           : showLoader,
    hideLoader           : hideLoader,
    formatDate           : formatDate,
    formatDateTime       : formatDateTime,
    statusBadge          : statusBadge,
    vehicleStatusBadge   : vehicleStatusBadge,
    alertBadge           : alertBadge,
    buildOptions         : buildOptions,
    buildEmployeeOptions : buildEmployeeOptions,
    buildVehicleOptions  : buildVehicleOptions,
    hasRole              : hasRole,
    escapeHtml           : escapeHtml
  };

})();
</script>
