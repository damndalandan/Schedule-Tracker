<script>
// ============================================================
// DashboardService.html — Dashboard Page Logic
// Save this file as: DashboardService.html in Apps Script
// ============================================================

const DashboardService = (() => {

  // ── LOAD ───────────────────────────────────────────────────
  function load() {
    const user = AppService.getCurrentUser();
    if (!user) return;

    const nameEl = document.getElementById('dashWelcomeName');
    if (nameEl) nameEl.textContent = user['Employee Name'] || '—';

    _loadStatsAndTrips();
    _loadRenewalAlerts();
  }

  // ── STATS + TRIPS (single call, reuse data) ────────────────
  function _loadStatsAndTrips() {
    google.script.run
      .withSuccessHandler(function(trips) {
        _renderStats(trips);
        _renderRecentTrips(trips);
        _renderPendingApprovals(trips);
      })
      .withFailureHandler(function(err) {
        AppService.showToast('Failed to load trips data.', 'error');
        var empty = '<tr><td colspan="4" class="table-empty">Failed to load.</td></tr>';
        var el1 = document.getElementById('dashRecentTrips');
        var el2 = document.getElementById('dashPendingList');
        if (el1) el1.innerHTML = empty;
        if (el2) el2.innerHTML = empty;
      })
      .getTrips();
  }

  // ── RENDER STATS ───────────────────────────────────────────
  function _renderStats(trips) {
    var appData   = AppService.getAppData();
    var total     = trips.length;
    var pending   = trips.filter(function(t) { return t['Status'] === 'Submitted'; }).length;
    var completed = trips.filter(function(t) { return t['Status'] === 'Completed'; }).length;
    var approved  = trips.filter(function(t) { return t['Status'] === 'Approved';  }).length;
    var vehicles  = appData ? appData.vehicles.length : 0;

    _set('dashTotalTrips', total);
    _set('dashPending',    pending);
    _set('dashCompleted',  completed);
    _set('dashApproved',   approved);
    _set('dashVehicles',   vehicles);

    // Sidebar approval badge
    var badge = document.getElementById('approvalBadge');
    if (badge) {
      badge.textContent = pending;
      if (pending === 0) {
        badge.classList.add('hidden');
      } else {
        badge.classList.remove('hidden');
      }
    }
  }

  function _set(id, val) {
    var el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  // ── RENDER RECENT TRIPS ────────────────────────────────────
  function _renderRecentTrips(trips) {
    var tbody = document.getElementById('dashRecentTrips');
    if (!tbody) return;

    var sorted = trips
      .filter(function(t) { return t['Trip ID']; })
      .sort(function(a, b) { return new Date(b['Request Date']) - new Date(a['Request Date']); })
      .slice(0, 6);

    if (sorted.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="table-empty">No trips yet.</td></tr>';
      return;
    }

    tbody.innerHTML = sorted.map(function(t) {
      return '<tr>' +
        '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--accent);">' +
          AppService.escapeHtml(t['Trip ID']) +
        '</span></td>' +
        '<td>' + AppService.escapeHtml(t['Requestor Name'] || '—') + '</td>' +
        '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' +
          AppService.escapeHtml(t['Purpose'] || '—') +
        '</td>' +
        '<td>' + AppService.statusBadge(t['Status']) + '</td>' +
      '</tr>';
    }).join('');
  }

  // ── RENDER PENDING APPROVALS ───────────────────────────────
  function _renderPendingApprovals(trips) {
    var tbody = document.getElementById('dashPendingList');
    if (!tbody) return;

    var pending = trips
      .filter(function(t) { return t['Status'] === 'Submitted'; })
      .sort(function(a, b) { return new Date(a['Request Date']) - new Date(b['Request Date']); })
      .slice(0, 6);

    if (pending.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" class="table-empty">No pending approvals.</td></tr>';
      return;
    }

    tbody.innerHTML = pending.map(function(t) {
      return '<tr>' +
        '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--accent);">' +
          AppService.escapeHtml(t['Trip ID']) +
        '</span></td>' +
        '<td>' + AppService.escapeHtml(t['Requestor Name'] || '—') + '</td>' +
        '<td>' + AppService.escapeHtml(t['Trip Type']      || '—') + '</td>' +
        '<td style="font-size:12px;color:var(--text-muted);">' +
          AppService.formatDate(t['Request Date']) +
        '</td>' +
      '</tr>';
    }).join('');
  }

  // ── RENEWAL ALERTS ─────────────────────────────────────────
  function _loadRenewalAlerts() {
    google.script.run
      .withSuccessHandler(function(result) {
        var tbody = document.getElementById('dashRenewalList');
        if (!tbody) return;

        // result.data is an array of arrays: [VehicleID, Plate, DocType, Expiry, DaysLeft, AlertStatus]
        var rows = result.data || [];
        var alerts = rows
          .filter(function(r) { return r[5] === 'Expired' || r[5] === 'Due in 30 Days'; })
          .slice(0, 6);

        // Sidebar renewal badge
        var badge = document.getElementById('renewalBadge');
        if (badge) {
          badge.textContent = alerts.length;
          if (alerts.length === 0) {
            badge.classList.add('hidden');
          } else {
            badge.classList.remove('hidden');
          }
        }

        // Dashboard stat card
        _set('dashAlerts', alerts.length);

        if (alerts.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="table-empty">No expiring documents.</td></tr>';
          return;
        }

        tbody.innerHTML = alerts.map(function(r) {
          var daysLeft   = Number(r[4]);
          var daysColor  = daysLeft < 0 ? 'var(--danger)' : daysLeft <= 10 ? 'var(--warning)' : 'var(--text)';
          var daysLabel  = daysLeft < 0
            ? (Math.abs(daysLeft) + ' days ago')
            : (daysLeft + ' days');

          return '<tr>' +
            '<td><span style="font-family:var(--font-mono);font-size:12px;">' +
              AppService.escapeHtml(String(r[0])) +
            '</span></td>' +
            '<td>' + AppService.escapeHtml(String(r[1])) + '</td>' +
            '<td>' + AppService.escapeHtml(String(r[2])) + '</td>' +
            '<td>' + AppService.formatDate(r[3])         + '</td>' +
            '<td><span style="font-weight:600;color:' + daysColor + ';">' + daysLabel + '</span></td>' +
            '<td>' + AppService.alertBadge(String(r[5])) + '</td>' +
          '</tr>';
        }).join('');
      })
      .withFailureHandler(function() {
        var tbody = document.getElementById('dashRenewalList');
        if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="table-empty">Failed to load.</td></tr>';
      })
      .refreshRenewalAlerts();
  }

  // ── PUBLIC ─────────────────────────────────────────────────
  return { load: load };

})();
</script>
