<script>
// ============================================================
// ReportsService.html — Reports Page Logic
// Save this file as: ReportsService.html in Apps Script
// ============================================================

var ReportsService = (function() {

  var _activeTab = 'byVehicle';
  var _loaded    = {
    byVehicle: false,
    byDriver:  false,
    byType:    false,
    mileage:   false,
    expiring:  false
  };

  // ── LOAD ───────────────────────────────────────────────────
  function load() {
    if (!AppService.hasRole('Admin', 'Approver', 'Auditor')) {
      document.getElementById('page-reports').innerHTML =
        '<div class="card" style="text-align:center;padding:40px;">' +
          '<i class="fas fa-lock" style="font-size:32px;color:var(--text-dim);margin-bottom:12px;display:block;"></i>' +
          '<div style="color:var(--text-muted);">You do not have access to this page.</div>' +
        '</div>';
      return;
    }

    // Reset loaded flags so data refreshes on each visit
    for (var key in _loaded) {
      _loaded[key] = false;
    }

    showTab(_activeTab);
  }

  // ── TAB SWITCHING ───────────────────────────────────────────
  function showTab(tab) {
    _activeTab = tab;

    // Toggle panels
    var panels = document.querySelectorAll('.report-panel');
    for (var i = 0; i < panels.length; i++) {
      panels[i].classList.add('hidden');
    }
    var activePanel = document.getElementById('panel-' + tab);
    if (activePanel) activePanel.classList.remove('hidden');

    // Toggle tab buttons
    var tabs = document.querySelectorAll('.report-tab');
    for (var j = 0; j < tabs.length; j++) {
      if (tabs[j].id === 'tab-' + tab) {
        tabs[j].classList.add('active');
      } else {
        tabs[j].classList.remove('active');
      }
    }

    // Load data only if not yet loaded
    if (!_loaded[tab]) {
      _loaded[tab] = true;
      if (tab === 'byVehicle') _loadByVehicle();
      if (tab === 'byDriver')  _loadByDriver();
      if (tab === 'byType')    _loadByType();
      if (tab === 'mileage')   _loadMileage();
      if (tab === 'expiring')  _loadExpiring();
    }
  }

  // ── REPORT 1: BY VEHICLE ───────────────────────────────────
  function _loadByVehicle() {
    var tbody = document.getElementById('rptByVehicleBody');
    if (tbody) tbody.innerHTML = _loadingRow(5);

    google.script.run
      .withSuccessHandler(function(data) {
        if (!tbody) return;
        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="table-empty">No completed trips recorded yet.</td></tr>';
          return;
        }

        // Sort by trip count descending
        data.sort(function(a, b) { return b.tripCount - a.tripCount; });

        var rows = '';
        for (var i = 0; i < data.length; i++) {
          var d    = data[i];
          var avg  = d.tripCount > 0 ? Math.round(d.totalMileage / d.tripCount) : 0;
          rows +=
            '<tr>' +
              '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--accent);">' +
                AppService.escapeHtml(d.vehicleId || '—') + '</span></td>' +
              '<td><strong>' + AppService.escapeHtml(d.plateNumber || '—') + '</strong></td>' +
              '<td>' + _numBadge(d.tripCount, 'blue') + '</td>' +
              '<td>' + _kmVal(d.totalMileage) + '</td>' +
              '<td style="color:var(--text-muted);">' + _kmVal(avg) + '</td>' +
            '</tr>';
        }
        tbody.innerHTML = rows;
      })
      .withFailureHandler(function() {
        if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="table-empty">Failed to load.</td></tr>';
      })
      .getReportTripsByVehicle();
  }

  // ── REPORT 2: BY DRIVER ────────────────────────────────────
  function _loadByDriver() {
    var tbody = document.getElementById('rptByDriverBody');
    if (tbody) tbody.innerHTML = _loadingRow(5);

    google.script.run
      .withSuccessHandler(function(data) {
        if (!tbody) return;
        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="table-empty">No completed trips recorded yet.</td></tr>';
          return;
        }

        data.sort(function(a, b) { return b.tripCount - a.tripCount; });

        var rows = '';
        for (var i = 0; i < data.length; i++) {
          var d   = data[i];
          var avg = d.tripCount > 0 ? Math.round(d.totalMileage / d.tripCount) : 0;
          rows +=
            '<tr>' +
              '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--text-muted);">' +
                AppService.escapeHtml(String(d.driverId || '—')) + '</span></td>' +
              '<td><strong>' + AppService.escapeHtml(d.driverName || '—') + '</strong></td>' +
              '<td>' + _numBadge(d.tripCount, 'blue') + '</td>' +
              '<td>' + _kmVal(d.totalMileage) + '</td>' +
              '<td style="color:var(--text-muted);">' + _kmVal(avg) + '</td>' +
            '</tr>';
        }
        tbody.innerHTML = rows;
      })
      .withFailureHandler(function() {
        if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="table-empty">Failed to load.</td></tr>';
      })
      .getReportTripsByDriver();
  }

  // ── REPORT 3: BY TYPE ──────────────────────────────────────
  function _loadByType() {
    var tbody = document.getElementById('rptByTypeBody');
    if (tbody) tbody.innerHTML = _loadingRow(3);

    google.script.run
      .withSuccessHandler(function(data) {
        if (!tbody) return;
        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="3" class="table-empty">No trips recorded yet.</td></tr>';
          return;
        }

        data.sort(function(a, b) { return b.tripCount - a.tripCount; });

        var total = 0;
        for (var i = 0; i < data.length; i++) { total += data[i].tripCount; }

        var rows = '';
        for (var j = 0; j < data.length; j++) {
          var d   = data[j];
          var pct = total > 0 ? Math.round((d.tripCount / total) * 100) : 0;
          rows +=
            '<tr>' +
              '<td>' +
                '<span style="display:inline-flex;align-items:center;gap:8px;">' +
                  '<i class="fas fa-circle" style="font-size:8px;color:var(--accent);"></i>' +
                  AppService.escapeHtml(d.tripType || '—') +
                '</span>' +
              '</td>' +
              '<td>' + _numBadge(d.tripCount, 'blue') + '</td>' +
              '<td>' +
                '<div style="display:flex;align-items:center;gap:10px;">' +
                  '<div style="flex:1;max-width:120px;height:6px;background:var(--border);border-radius:3px;">' +
                    '<div style="width:' + pct + '%;height:100%;background:var(--accent);border-radius:3px;"></div>' +
                  '</div>' +
                  '<span style="font-size:13px;font-weight:600;color:var(--text-muted);">' + pct + '%</span>' +
                '</div>' +
              '</td>' +
            '</tr>';
        }
        tbody.innerHTML = rows;
      })
      .withFailureHandler(function() {
        if (tbody) tbody.innerHTML = '<tr><td colspan="3" class="table-empty">Failed to load.</td></tr>';
      })
      .getReportTripsByType();
  }

  // ── REPORT 4: MILEAGE SUMMARY ──────────────────────────────
  function _loadMileage() {
    var tbody = document.getElementById('rptMileageBody');
    if (tbody) tbody.innerHTML = _loadingRow(5);

    google.script.run
      .withSuccessHandler(function(data) {
        if (!tbody) return;
        if (!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="table-empty">No vehicles found.</td></tr>';
          return;
        }

        // Sort by total recorded descending
        data.sort(function(a, b) { return b.totalRecorded - a.totalRecorded; });

        var rows = '';
        for (var i = 0; i < data.length; i++) {
          var d = data[i];
          rows +=
            '<tr>' +
              '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--accent);">' +
                AppService.escapeHtml(d.vehicleId || '—') + '</span></td>' +
              '<td><strong>' + AppService.escapeHtml(d.plateNumber || '—') + '</strong></td>' +
              '<td class="muted">' + _kmVal(d.beginningMileage) + '</td>' +
              '<td>' + _kmVal(d.latestEndMileage) + '</td>' +
              '<td>' +
                '<span style="font-weight:700;color:' + (d.totalRecorded > 0 ? 'var(--accent)' : 'var(--text-muted)') + ';">' +
                  _kmVal(d.totalRecorded) +
                '</span>' +
              '</td>' +
            '</tr>';
        }
        tbody.innerHTML = rows;
      })
      .withFailureHandler(function() {
        if (tbody) tbody.innerHTML = '<tr><td colspan="5" class="table-empty">Failed to load.</td></tr>';
      })
      .getReportMileageSummary();
  }

  // ── REPORT 5: EXPIRING DOCUMENTS ───────────────────────────
  function _loadExpiring() {
    var tbody = document.getElementById('rptExpiringBody');
    if (tbody) tbody.innerHTML = _loadingRow(6);

    google.script.run
      .withSuccessHandler(function(data) {
        if (!tbody) return;
        if (!data || data.length === 0) {
          tbody.innerHTML =
            '<tr><td colspan="6" class="table-empty">' +
              '<i class="fas fa-circle-check" style="color:var(--success);margin-right:8px;"></i>' +
              'No expiring or expired documents.' +
            '</td></tr>';
          return;
        }

        // Sort: Expired first, then by days left ascending
        data.sort(function(a, b) {
          var aExp = String(a['Alert Status']) === 'Expired' ? -1 : 0;
          var bExp = String(b['Alert Status']) === 'Expired' ? -1 : 0;
          if (aExp !== bExp) return aExp - bExp;
          return Number(a['Days Left']) - Number(b['Days Left']);
        });

        var rows = '';
        for (var i = 0; i < data.length; i++) {
          var r        = data[i];
          var daysLeft = Number(r['Days Left']);
          var daysColor = daysLeft < 0 ? 'var(--danger)' : daysLeft <= 7 ? 'var(--danger)' : 'var(--warning)';
          var daysLabel = daysLeft < 0
            ? Math.abs(daysLeft) + ' days ago'
            : daysLeft + ' days';

          var docIcon = String(r['Document Type']).indexOf('Insurance') > -1
            ? '<i class="fas fa-shield-halved" style="color:var(--accent);margin-right:6px;"></i>'
            : '<i class="fas fa-car-side" style="color:var(--warning);margin-right:6px;"></i>';

          rows +=
            '<tr>' +
              '<td><span style="font-family:var(--font-mono);font-size:12px;color:var(--accent);">' +
                AppService.escapeHtml(String(r['Vehicle ID']   || '—')) + '</span></td>' +
              '<td><strong>' + AppService.escapeHtml(String(r['Plate Number'] || '—')) + '</strong></td>' +
              '<td>' + docIcon + AppService.escapeHtml(String(r['Document Type'] || '—')) + '</td>' +
              '<td>' + AppService.formatDate(r['Expiry Date']) + '</td>' +
              '<td><span style="font-weight:600;color:' + daysColor + ';">' + daysLabel + '</span></td>' +
              '<td>' + AppService.alertBadge(String(r['Alert Status'])) + '</td>' +
            '</tr>';
        }
        tbody.innerHTML = rows;
      })
      .withFailureHandler(function() {
        if (tbody) tbody.innerHTML = '<tr><td colspan="6" class="table-empty">Failed to load.</td></tr>';
      })
      .getReportExpiringDocuments();
  }

  // ── HELPERS ─────────────────────────────────────────────────
  function _loadingRow(cols) {
    return '<tr><td colspan="' + cols + '" class="table-empty"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>';
  }

  function _kmVal(val) {
    var n = Number(val);
    if (isNaN(n) || n === 0) return '<span style="color:var(--text-dim);">0 km</span>';
    return n.toLocaleString() + ' <span style="color:var(--text-muted);font-size:11px;">km</span>';
  }

  function _numBadge(val, color) {
    var colors = {
      blue:   { bg: 'rgba(79,142,247,0.15)',  fg: 'var(--accent)'   },
      green:  { bg: 'rgba(34,197,94,0.15)',   fg: 'var(--success)'  },
      yellow: { bg: 'rgba(245,158,11,0.15)',  fg: 'var(--warning)'  }
    };
    var c = colors[color] || colors.blue;
    return '<span style="background:' + c.bg + ';color:' + c.fg + ';font-weight:700;' +
      'padding:3px 10px;border-radius:20px;font-size:13px;">' + Number(val).toLocaleString() + '</span>';
  }

  // ── PUBLIC ──────────────────────────────────────────────────
  return {
    load    : load,
    showTab : showTab
  };

})();
</script>
