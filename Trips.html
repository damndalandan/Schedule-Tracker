<!-- ── TRIPS PAGE ──────────────────────────────────────────── -->
<div class="page-header">
  <div>
    <div class="page-header-title">Trip Requests</div>
    <div class="page-header-sub">Create and manage trip requests</div>
  </div>
  <div class="action-row">
    <button class="btn btn-ghost btn-sm" onclick="TripsService.load()">
      <i class="fas fa-rotate-right"></i> Refresh
    </button>
    <button class="btn btn-primary" onclick="TripsService.openForm()">
      <i class="fas fa-plus"></i> New Trip
    </button>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <input type="text" class="form-control" id="tripSearch"
    placeholder="Search ID, requestor, purpose..."
    oninput="TripsService.applyFilter()"/>
  <select class="form-control" id="tripFilterStatus" onchange="TripsService.applyFilter()">
    <option value="">All Statuses</option>
    <option value="Draft">Draft</option>
    <option value="Submitted">Submitted</option>
    <option value="Approved">Approved</option>
    <option value="Rejected">Rejected</option>
    <option value="Cancelled">Cancelled</option>
    <option value="Completed">Completed</option>
  </select>
  <select class="form-control" id="tripFilterType" onchange="TripsService.applyFilter()">
    <option value="">All Trip Types</option>
  </select>
</div>

<!-- TRIPS TABLE -->
<div class="card" style="padding:0;overflow:hidden;">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Trip ID</th>
          <th>Request Date</th>
          <th>Requestor</th>
          <th>Trip Type</th>
          <th>Purpose</th>
          <th>Vehicle</th>
          <th>Driver</th>
          <th>Planned Start</th>
          <th>Status</th>
          <th style="text-align:right;">Actions</th>
        </tr>
      </thead>
      <tbody id="tripsTableBody">
        <tr><td colspan="10" class="table-empty">
          <i class="fas fa-spinner fa-spin"></i> Loading...
        </td></tr>
      </tbody>
    </table>
  </div>
</div>
